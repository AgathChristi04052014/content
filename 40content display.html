
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Display</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #4b8147;
            margin:0;
            padding:0;
        }

        header{
            background:#000000;
            color:rgb(141, 223, 172);
            padding:15px;
            text-align:center;
        }

        .container{
            width:80%;
            margin:auto;
            margin-top:20px;
        }

        .project{
            background:rgb(117, 45, 45);
            padding:20px;
            margin-bottom:20px;
            border-radius:8px;
            box-shadow:0 2px 5px rgb(255, 255, 255);
        }

        .project img{
            width:100%;
            max-height:300px;
            object-fit:cover;
            border-radius:5px;
        }

        .project h2{
            margin-top:10px;
        }

        .btn{
            display:inline-block;
            margin-top:10px;
            padding:10px 15px;
            background:#175aa1;
            color:white;
            text-decoration:none;
            border-radius:5px;
        }

        .btn:hover{
            background:#0056b3;
        }
    </style>
</head>

<body>

<header>
    <h1>My Place Visitation company</h1>
</header>

<div class="container">

    <div class="project">
        <img src="image1.jpeg" alt="Project Image">
        <h2>Place 1 Description</h2>
        <p>Thisis the best place if you like water ,it is a very enthusiastic place for visitation.</p>
        <a href="#" class="btn">View Details </a>
    </div>

    <div class="project">
        <img src="image2.jpeg" alt="Project Image">
        <h2>Place 2 Description</h2>
        <p>This the best place if you like mountains and winters, it is very calm.</p>
        <a href="#" class="btn">View Details </a>
    </div>

</div>

</body>
</html>
